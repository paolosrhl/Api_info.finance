<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - FinanceInfo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0056D2;
            --primary-dark: #1A1D2E;
            --text-main: #333333;
            --text-subtle: #666666;
            --bg-light: #FBFBFC;
            --border-color: #E6E8ED;
            --success-green: #28a745;
            --error-red: #dc3545;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-main);
            margin: 0;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            background-color: #333;
            padding: 12px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .menu a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .menu a:hover { opacity: 0.7; }

        .search-bar { display: flex; gap: 8px; }

        .search-bar input {
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            outline: none;
        }

        .search-bar button {
            padding: 8px 15px;
            background: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Container */
        .container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 0 2rem;
        }

        .page-title {
            color: var(--primary-dark);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .page-subtitle {
            color: var(--text-subtle);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
        }

        /* Form Card */
        .contact-form-card {
            background: #FFFFFF;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            border: 1px solid var(--border-color);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .form-group { margin-bottom: 1.5rem; }

        label {
            display: block;
            color: var(--primary-dark);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 4px rgba(0, 86, 210, 0.1);
        }

        /* Submit Button & Loader */
        .btn-submit {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-left: auto;
        }

        .btn-submit:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid #ffffff66;
            border-top: 2px solid white;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Status Toast */
        #statusMessage {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 8px;
            display: none;
            font-weight: 500;
            text-align: center;
        }

        .success { background: #e7f5ea; color: var(--success-green); border: 1px solid #c3e6cb; }
        .error { background: #fdeaea; color: var(--error-red); border: 1px solid #f5c6cb; }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-subtle);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu">
            <a href="#">Accueil</a>
            <a href="#">Produits</a>
            <a href="#">Contact</a>
        </div>
        <div class="search-bar">
            <input type="text" placeholder="Rechercher...">
            <button>OK</button>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Get in Touch</h1>
        <p class="page-subtitle">Have a question? Reach out to our team of financial analysts.</p>

        <div class="contact-form-card">
            <form id="contactForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <input type="text" id="first_name" name="first_name" placeholder="Sarah" required>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <input type="text" id="last_name" name="last_name" placeholder="Johnson" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Work Email</label>
                    <input type="email" id="email" name="email" placeholder="sarah.johnson@company.com" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Market Analysis Inquiry" required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" placeholder="Type your inquiry here..." required></textarea>
                </div>

                <button type="submit" id="submitBtn" class="btn-submit">
                    <span class="spinner" id="spinner"></span>
                    <span id="btnText">Submit Inquiry</span>
                </button>
                
                <div id="statusMessage"></div>
            </form>
        </div>
    </div>

    <footer>  
        <p>&copy; 2026 FinanceInfo. All rights reserved.</p>
    </footer>

    <script>
        const form = document.getElementById('contactForm');
        const btn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        const statusMsg = document.getElementById('statusMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // UI Loading State
            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'Sending...';
            statusMsg.style.display = 'none';

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            try {
                // IMPORTANT: Replace this URL with your actual AlwaysData API endpoint
                const response = await fetch('https://your-api.alwaysdata.net/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    showStatus('Success! Your message has been sent.', 'success');
                    form.reset();
                } else {
                    showStatus('Server error. Please try again later.', 'error');
                }
            } catch (err) {
                showStatus('Network error. Check your connection.', 'error');
            } finally {
                // Reset UI State
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'Submit Inquiry';
            }
        });

        function showStatus(msg, type) {
            statusMsg.innerText = msg;
            statusMsg.className = type;
            statusMsg.style.display = 'block';
        }
    </script>
</body>
</html>
