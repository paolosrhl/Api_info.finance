<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu + Recherche</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    nav {
      background-color: #333;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .menu a {
      color: white;
      text-decoration: none;
      margin-right: 15px;
    }

    .menu a:hover {
      text-decoration: underline;
    }

    .search-bar input {
      padding: 6px;
      border: none;
      border-radius: 4px;
    }

    .search-bar button {
      padding: 6px 10px;
      border: none;
      border-radius: 4px;
      margin-left: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <nav>
    <div class="menu">
      <a href="#">Accueil</a>
      <a href="#">Produits</a>
      <a href="#">Contact</a>
    </div>

    <div class="search-bar">
      <input type="text" placeholder="Rechercher..." />
      <button type="submit">OK</button>
    </div>
  </nav>

</body>
</html>
